name: Pages

# Webpack-only deploy: no Emscripten, no keystone build required.
# wasmasm.js and wasmasm.wasm are committed to the repo so this job just
# runs `npm run build` (Vue CLI / webpack) and pushes dist/ to gh-pages.
#
# Triggered by any push to master that does NOT touch C source or the
# keystone/capstone submodules — those paths use the full deploy.yml instead.

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'wasmasm.c'
      - 'third_party/keystone/**'
      - 'third_party/capstone/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # peaceiris/actions-gh-pages pushes to gh-pages branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Submodules are not needed — only the Vue source and committed WASM assets.

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: wasmasm/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix wasmasm

      - name: Build Vue app
        run: npm run build --prefix wasmasm

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./wasmasm/dist
          cname: wasmasm.computer
